<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>訂單後台管理</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --brown: #4A2C1A; --cream: #F9F4EE; --border: #EDE4D8;
      --white: #FFFFFF; --text: #2D1A0E; --muted: #9B7B5E;
      --green: #06C755; --yellow: #FF9500; --red: #E8622A; --gray: #8E8E93;
    }
    body {
      font-family: -apple-system, 'PingFang TC', 'Microsoft JhengHei', sans-serif;
      background: #F0EDE8; min-height: 100vh;
    }

    .header {
      background: var(--brown); color: var(--white); padding: 14px 20px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 10; box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    .header-title { font-size: 17px; font-weight: 700; }
    .header-sub   { font-size: 11px; opacity: 0.6; margin-top: 2px; }
    .badge { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); border-radius: 12px; padding: 4px 10px; font-size: 11px; font-weight: 600; }

    .content { padding: 12px; max-width: 600px; margin: 0 auto; }
    .toolbar { display: flex; justify-content: space-between; align-items: center; padding: 8px 4px 6px; }
    .count-label { font-size: 12px; color: var(--muted); }
    .refresh-btn { background: var(--white); border: 1.5px solid var(--border); border-radius: 10px; padding: 5px 12px; font-size: 12px; color: var(--muted); cursor: pointer; }
    .refresh-btn:hover { border-color: var(--brown); color: var(--brown); }

    .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }

    /* ── 訂單卡 ── */
    .order-card {
      background: var(--white); border-radius: 16px; margin-bottom: 12px;
      overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      animation: fadeIn 0.25s ease;
    }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);} }
    .card-body { display: flex; gap: 12px; padding: 16px; }
    .card-main { flex: 1; min-width: 0; }
    .card-qr   { flex-shrink: 0; display: flex; flex-direction: column; align-items: center; gap: 4px; }

    .order-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
    .locker-tag {
      background: var(--brown); color: var(--white);
      border-radius: 8px; padding: 4px 12px;
      font-size: 14px; font-weight: 800; font-family: monospace; letter-spacing: 1px;
    }
    .status-badge { border-radius: 12px; padding: 3px 10px; font-size: 11px; font-weight: 700; }
    .s-pending   { background: #FFF3E0; color: var(--yellow); border: 1.5px solid #FFD180; }
    .s-placed    { background: #E8F5E9; color: var(--green);  border: 1.5px solid #A5D6A7; }
    .s-picked_up { background: #F5F5F5; color: var(--gray);   border: 1.5px solid #E0E0E0; }

    .order-time { font-size: 11px; color: var(--muted); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
    .expire-badge { font-size: 10px; padding: 1px 7px; border-radius: 8px; font-weight: 700; background: #FFF3E0; color: var(--yellow); border: 1px solid #FFD180; }
    .expire-badge.urgent { background: #FFEBEE; color: var(--red); border-color: #FFCDD2; }

    .item-list { margin-bottom: 8px; }
    .item-row  { display: flex; justify-content: space-between; font-size: 13px; padding: 4px 0; border-bottom: 1px dashed var(--border); }
    .item-row:last-child { border-bottom: none; }
    .item-left { display: flex; align-items: center; gap: 6px; }
    .item-qty  { background: var(--brown); color: var(--white); border-radius: 6px; padding: 1px 6px; font-size: 11px; font-weight: 700; }
    .total-row { display: flex; justify-content: space-between; padding-top: 8px; border-top: 1.5px solid var(--border); }
    .total-label { font-size: 13px; color: var(--muted); }
    .total-amt   { font-size: 16px; font-weight: 900; color: var(--red); }

    .qr-cell { width: 96px; height: 96px; border: 2px solid var(--brown); border-radius: 10px; overflow: hidden; display: flex; align-items: center; justify-content: center; background: var(--white); }
    .qr-cell canvas, .qr-cell img { width: 92px !important; height: 92px !important; }
    .qr-label { font-size: 10px; color: var(--muted); text-align: center; }
    .qr-locker { font-size: 9px; font-family: monospace; color: var(--brown); font-weight: 700; text-align: center; }

    /* ── 底部動作列 ── */
    .card-action { padding: 10px 16px; border-top: 1px solid var(--border); background: var(--cream); display: flex; align-items: center; gap: 8px; }
    .place-btn {
      flex: 1; background: var(--green); color: var(--white);
      border: none; border-radius: 12px; padding: 10px;
      font-size: 14px; font-weight: 700; cursor: pointer; transition: background 0.2s;
    }
    .place-btn:hover { background: #05a847; }
    .pickup-btn {
      flex: 1; background: #5856D6; color: var(--white);
      border: none; border-radius: 12px; padding: 10px;
      font-size: 14px; font-weight: 700; cursor: pointer; transition: background 0.2s;
    }
    .pickup-btn:hover { background: #4340c4; }
    .placed-info { font-size: 13px; color: var(--green); font-weight: 600; }
    .done-info   { font-size: 13px; color: var(--gray);  font-weight: 600; }
  </style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">📋 訂單後台管理</div>
    <div class="header-sub" id="headerSub">自動更新中…</div>
  </div>
  <div class="badge">STAFF</div>
</div>

<div class="content">
  <div class="toolbar">
    <span class="count-label" id="countLabel">—</span>
    <button class="refresh-btn" onclick="refresh()">↻ 重新整理</button>
  </div>
  <div id="orderList"></div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbzrHgVEPUmVJ8aN2-SNZ024G6QRZWGFw4vDxNErIhrV6bEmbAPErJBUlRoGSNB6y2z-_A/exec';
let allOrders = {};

async function apiCall(params) {
  const url = API_URL + '?' + new URLSearchParams(params);
  const res  = await fetch(url);
  return res.json();
}

async function refresh() {
  try {
    const orders = await apiCall({ action: 'getOrders' });
    allOrders = (orders && !orders.error) ? orders : {};
  } catch(e) {
    allOrders = {};
  }
  const all    = Object.values(allOrders);
  const active = all.filter(o => o.status !== 'picked_up').length;
  document.getElementById('countLabel').textContent = `共 ${all.length} 筆｜待處理 ${active} 筆`;
  document.getElementById('headerSub').textContent  = `最後更新 ${new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}`;
  renderList();
}

function renderList() {
  const list = document.getElementById('orderList');
  const orders = Object.values(allOrders).sort((a,b) => (b.ts||'').localeCompare(a.ts||''));
  if (!orders.length) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">📭</div>目前沒有訂單</div>`;
    return;
  }
  list.innerHTML = orders.map(o => cardHTML(o)).join('');
  orders.forEach(o => buildQR(o));
}

function cardHTML(o) {
  const badge = {
    pending:   `<span class="status-badge s-pending">⏳ 待放餐</span>`,
    placed:    `<span class="status-badge s-placed">✅ 已放入</span>`,
    picked_up: `<span class="status-badge s-picked_up">🎉 已取餐</span>`,
  }[o.status] || '';

  const itemsHTML = (o.items||[]).map(i => `
    <div class="item-row">
      <div class="item-left">${i.e} ${i.n}<span class="item-qty">×${i.q}</span></div>
      <span>$${i.v*i.q}</span>
    </div>`).join('');

  const locker = (o.locker || '').toUpperCase();

  return `
    <div class="order-card" id="card-${o.id}">
      <div class="card-body">
        <div class="card-main">
          <div class="order-top">
            <span class="locker-tag">${locker || '—'}</span>
            ${badge}
          </div>
          <div class="order-time">訂單 #${o.id}　${fmtTime(o.ts)}${expireBadge(o.ts)}</div>
          <div class="item-list">${itemsHTML}</div>
          <div class="total-row">
            <span class="total-label">合計</span>
            <span class="total-amt">$${o.t}</span>
          </div>
        </div>
        <div class="card-qr">
          <div class="qr-cell" id="qr-${o.id}"></div>
          <div class="qr-label">放餐 QR</div>
          <div class="qr-locker">${locker}</div>
        </div>
      </div>
      ${actionBar(o)}
    </div>`;
}

function actionBar(o) {
  if (o.status === 'pending') return `
    <div class="card-action">
      <button class="place-btn" onclick="markPlaced('${o.id}')">📦 放餐完成</button>
      <button class="pickup-btn" onclick="markPickedUp('${o.id}')">🎉 已取餐</button>
    </div>`;
  if (o.status === 'placed') return `
    <div class="card-action">
      <span class="placed-info" style="flex:1">✅ 已放入 ${(o.locker||'').toUpperCase()}</span>
      <button class="pickup-btn" onclick="markPickedUp('${o.id}')">🎉 已取餐</button>
    </div>`;
  return `<div class="card-action"><span class="done-info">🎉 客戶已完成取餐</span></div>`;
}

function buildQR(o) {
  const container = document.getElementById('qr-' + o.id);
  if (!container || container.childElementCount > 0) return;
  const locker = o.locker || o.id;
  try {
    new QRCode(container, {
      text: locker.toUpperCase(),
      width: 92, height: 92,
      colorDark: '#4A2C1A', colorLight: '#FFFFFF',
      correctLevel: QRCode.CorrectLevel.M,
    });
  } catch(e) { container.textContent = '?'; }
}

async function markPlaced(id) {
  const placedAt = new Date().toISOString().slice(0,16);
  try { await apiCall({ action: 'updateOrder', data: JSON.stringify({ id, patch: { status: 'placed', placedAt } }) }); } catch(e) {}
  refresh();
}

async function markPickedUp(id) {
  delete allOrders[id];
  renderList();
  try { await apiCall({ action: 'deleteOrder', data: JSON.stringify({ id }) }); } catch(e) {}
}

function expireBadge(iso) {
  if (!iso) return '';
  const ts = new Date(iso + (iso.length === 16 ? ':00' : '')).getTime();
  const remaining = Math.ceil((15 * 60 * 1000 - (Date.now() - ts)) / 60000);
  if (remaining <= 0) return '';
  const urgent = remaining <= 5;
  return `<span class="expire-badge${urgent ? ' urgent' : ''}">剩 ${remaining} 分鐘</span>`;
}

function fmtTime(iso) {
  if (!iso) return '—';
  const d = new Date(iso + (iso.length===16?':00':''));
  if (isNaN(d)) return iso;
  return d.toLocaleString('zh-TW', { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' });
}

refresh();
</script>
</body>
</html>
