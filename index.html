<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>智慧格子櫃點餐</title>
  <!-- LINE LIFF SDK（填入 LIFF_ID 後接上 LINE） -->
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --brown-dark:  #4A2C1A;
      --brown-mid:   #7B4A2D;
      --brown-light: #C8956C;
      --cream:       #F9F4EE;
      --cream-dark:  #EDE4D8;
      --accent:      #E8622A;
      --text:        #2D1A0E;
      --text-muted:  #9B7B5E;
      --white:       #FFFFFF;
      --green:       #06C755;
      --shadow:      0 2px 12px rgba(74,44,26,0.12);
    }
    body {
      font-family: -apple-system, 'PingFang TC', 'Microsoft JhengHei', sans-serif;
      background: var(--cream); color: var(--text);
      min-height: 100vh; display: flex; justify-content: center;
    }
    .app {
      width: 100%; max-width: 480px; min-height: 100vh;
      background: var(--white); display: flex; flex-direction: column;
    }

    /* ── Loading ── */
    .loading-overlay {
      position: fixed; inset: 0; background: var(--brown-dark);
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 16px; z-index: 9999;
      transition: opacity 0.4s ease;
    }
    .loading-overlay.hidden { opacity: 0; pointer-events: none; }
    .loading-emoji { font-size: 56px; animation: pulse 1.2s ease-in-out infinite; }
    .loading-text  { color: var(--white); font-size: 16px; opacity: 0.8; }
    @keyframes pulse { 0%,100% { transform:scale(1); } 50% { transform:scale(1.12); } }

    /* ── DEMO banner ── */
    .demo-banner {
      display: none; background: #FFF3CD; border-bottom: 1px solid #FFC107;
      padding: 8px 16px; font-size: 12px; color: #856404;
      align-items: center; gap: 6px;
    }

    /* ── Header ── */
    .header {
      background: var(--brown-dark); color: var(--white);
      padding: 12px 16px; display: flex; align-items: center;
      justify-content: space-between; position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    .header-left    { display: flex; align-items: center; gap: 10px; }
    .user-avatar    {
      width: 36px; height: 36px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.4); object-fit: cover; display: none;
    }
    .user-avatar-ph {
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(255,255,255,0.15);
      display: flex; align-items: center; justify-content: center; font-size: 18px;
    }
    .header-title   { font-size: 17px; font-weight: 700; }
    .header-subtitle{ font-size: 11px; opacity: 0.7; margin-top: 2px; }
    .cart-btn {
      background: var(--accent); border: none; border-radius: 20px;
      color: var(--white); padding: 8px 14px; font-size: 14px; font-weight: 600;
      cursor: pointer; display: flex; align-items: center; gap: 6px; transition: background 0.2s;
    }
    .cart-btn:hover { background: #d45520; }
    .cart-badge {
      background: var(--white); color: var(--accent); border-radius: 50%;
      width: 20px; height: 20px; display: flex; align-items: center;
      justify-content: center; font-size: 11px; font-weight: 700;
    }

    /* ── Screens ── */
    .screen { display: none; flex: 1; flex-direction: column; }
    .screen.active { display: flex; }
    @keyframes slideUp { from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);} }
    .screen.active { animation: slideUp 0.25s ease; }

    /* ── Menu ── */
    .category-label {
      padding: 16px 20px 8px; font-size: 13px; font-weight: 600;
      color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px;
    }
    .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 16px 100px; }
    .menu-card {
      background: var(--white); border: 1.5px solid var(--cream-dark);
      border-radius: 16px; padding: 16px 12px;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .menu-card.has-qty { border-color: var(--brown-light); box-shadow: 0 0 0 2px rgba(200,149,108,0.2); }
    .menu-emoji   { font-size: 42px; line-height: 1; }
    .menu-name    { font-size: 14px; font-weight: 700; text-align: center; }
    .menu-name-en { font-size: 11px; color: var(--text-muted); text-align: center; }
    .menu-price   { font-size: 15px; font-weight: 700; color: var(--accent); }
    .qty-control  { display: flex; align-items: center; gap: 12px; margin-top: 4px; }
    .qty-btn {
      width: 28px; height: 28px; border-radius: 50%;
      border: 2px solid var(--brown-light); background: var(--white);
      color: var(--brown-mid); font-size: 16px; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center; line-height: 1;
      transition: background 0.15s;
    }
    .qty-btn:hover { background: var(--cream-dark); }
    .qty-btn.plus  { border-color: var(--accent); color: var(--accent); }
    .qty-num       { font-size: 16px; font-weight: 700; min-width: 20px; text-align: center; }

    /* ── Float bar ── */
    .float-bar {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 480px; padding: 12px 16px;
      background: var(--white); border-top: 1px solid var(--cream-dark); z-index: 200;
    }
    .goto-cart-btn {
      width: 100%; background: var(--brown-dark); color: var(--white);
      border: none; border-radius: 14px; padding: 15px;
      font-size: 16px; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: space-between; transition: background 0.2s;
    }
    .goto-cart-btn:hover    { background: var(--brown-mid); }
    .goto-cart-btn:disabled { background: var(--cream-dark); color: var(--text-muted); cursor: default; }
    .goto-cart-right        { display: flex; align-items: center; gap: 8px; }

    /* ── Cart ── */
    .cart-list  { flex: 1; overflow-y: auto; padding: 16px; }
    .cart-item  {
      display: flex; align-items: center; gap: 12px;
      padding: 14px; background: var(--cream); border-radius: 14px; margin-bottom: 10px;
    }
    .cart-item-emoji    { font-size: 32px; }
    .cart-item-info     { flex: 1; }
    .cart-item-name     { font-size: 15px; font-weight: 700; }
    .cart-item-price    { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
    .cart-item-qty      {
      font-size: 13px; background: var(--brown-light); color: var(--white);
      border-radius: 10px; padding: 3px 10px; font-weight: 700;
    }
    .cart-item-subtotal { font-size: 15px; font-weight: 700; color: var(--accent); min-width: 52px; text-align: right; }
    .cart-divider       { height: 1px; background: var(--cream-dark); margin: 8px 0; }
    .cart-total-row     {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px; font-size: 18px; font-weight: 700;
    }
    .cart-total-price   { color: var(--accent); font-size: 22px; }
    .order-btn {
      margin: 0 16px 24px; background: var(--accent); color: var(--white);
      border: none; border-radius: 14px; padding: 16px; font-size: 17px; font-weight: 700;
      cursor: pointer; width: calc(100% - 32px); transition: background 0.2s;
    }
    .order-btn:hover { background: #d45520; }

    /* ── QR Screen ── */
    .qr-screen  { align-items: center; padding: 24px 20px; background: var(--white); }
    .locker-badge {
      background: var(--brown-dark); color: var(--white);
      border-radius: 14px; padding: 10px 28px;
      font-size: 13px; font-weight: 600; margin-bottom: 6px;
    }
    .locker-code {
      font-size: 22px; font-weight: 900; color: var(--brown-dark);
      letter-spacing: 2px; margin-bottom: 4px; font-family: monospace;
    }
    .qr-order-num {
      font-size: 32px; font-weight: 900; color: var(--brown-dark);
      letter-spacing: 3px; margin-bottom: 4px;
    }
    .qr-hint    { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; }
    .qr-box     {
      background: var(--white); border: 3px solid var(--brown-dark);
      border-radius: 20px; padding: 20px; box-shadow: var(--shadow); margin-bottom: 16px;
    }
    #qrcode canvas, #qrcode img { border-radius: 8px; }
    .qr-scan-hint {
      background: var(--cream); border-radius: 12px; padding: 12px 20px;
      font-size: 14px; color: var(--text-muted); text-align: center;
      margin-bottom: 16px; width: 100%;
    }
    .qr-scan-hint strong { color: var(--text); }
    .qr-items-summary {
      width: 100%; background: var(--cream); border-radius: 14px;
      padding: 14px 16px; margin-bottom: 16px;
    }
    .qr-items-title { font-size: 13px; font-weight: 700; color: var(--text-muted); margin-bottom: 10px; }
    .qr-item-row    { display: flex; justify-content: space-between; font-size: 14px; padding: 3px 0; }
    .qr-total-row   {
      display: flex; justify-content: space-between; font-size: 15px; font-weight: 700;
      padding: 8px 0 0; border-top: 1px solid var(--cream-dark); margin-top: 6px;
    }
    .qr-total-row span:last-child { color: var(--accent); }
    .qr-actions     { display: flex; flex-direction: column; gap: 10px; width: 100%; }
    .close-btn {
      width: 100%; background: var(--green); color: var(--white); border: none;
      border-radius: 14px; padding: 14px; font-size: 15px; font-weight: 700;
      cursor: pointer; display: none; align-items: center; justify-content: center; gap: 8px;
    }
    .close-btn.show { display: flex; }
    .new-order-btn {
      width: 100%; background: var(--white); border: 2px solid var(--brown-dark);
      color: var(--brown-dark); border-radius: 14px; padding: 14px;
      font-size: 15px; font-weight: 700; cursor: pointer; transition: background 0.2s;
    }
    .new-order-btn:hover { background: var(--cream); }
  </style>
</head>
<body>
<div class="app">

  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-emoji">☕</div>
    <div class="loading-text">載入中…</div>
  </div>

  <div class="demo-banner" id="demoBanner">
    ⚠️ DEMO 模式（瀏覽器預覽）— 在 LINE 開啟才會讀取真實用戶資料
  </div>

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <img class="user-avatar" id="userAvatar" src="" alt="">
      <div class="user-avatar-ph" id="userAvatarPh">☕</div>
      <div>
        <div class="header-title" id="headerTitle">智慧格子櫃點餐</div>
        <div class="header-subtitle" id="headerSub">載入中…</div>
      </div>
    </div>
    <button class="cart-btn" id="cartBtn" onclick="goToCart()">
      🛒 <span id="cartBtnLabel">購物車</span>
      <div class="cart-badge" id="cartCount">0</div>
    </button>
  </div>

  <!-- Screen 1: Menu -->
  <div class="screen active" id="screenMenu">
    <div class="category-label">熱門飲品</div>
    <div class="menu-grid" id="menuGrid"></div>
    <div class="float-bar">
      <button class="goto-cart-btn" id="gotoCartBtn" onclick="goToCart()" disabled>
        <span>前往確認訂單</span>
        <div class="goto-cart-right">
          <span id="cartSummary">尚未選取</span><span>→</span>
        </div>
      </button>
    </div>
  </div>

  <!-- Screen 2: Cart -->
  <div class="screen" id="screenCart">
    <div class="cart-list" id="cartList"></div>
    <div class="cart-divider"></div>
    <div class="cart-total-row">
      <span>合計</span>
      <span class="cart-total-price" id="cartTotal">$0</span>
    </div>
    <button class="order-btn" onclick="placeOrder()">✅ 確認下單</button>
  </div>

  <!-- Screen 3: QR -->
  <div class="screen qr-screen" id="screenQR">
    <div class="locker-badge">您的取餐格子</div>
    <div class="locker-code" id="lockerCode">—</div>
    <div class="qr-order-num" id="qrOrderNum"></div>
    <div class="qr-hint">持此 QR Code 至格子櫃掃碼取餐</div>
    <div class="qr-box"><div id="qrcode"></div></div>
    <div class="qr-scan-hint">
      📦 <strong>工作人員備餐完成後</strong><br>將飲品放入您的格子，再掃碼取餐
    </div>
    <div class="qr-items-summary" id="qrItemsSummary"></div>
    <div class="qr-actions">
      <button class="close-btn" id="closeBtn" onclick="closeApp()">
        ✅ 完成・關閉視窗
      </button>
      <button class="new-order-btn" onclick="resetOrder()">🔄 重新點餐</button>
    </div>
  </div>

</div>
<script>
// ════════════════════════════════════════
//  LIFF 設定
// ════════════════════════════════════════
const LIFF_ID = 'YOUR_LIFF_ID';  // ← 填入你的 LIFF ID

// ════════════════════════════════════════
//  格子櫃代碼（固定 12 個）
// ════════════════════════════════════════
const LOCKERS = Array.from({length: 12}, (_, i) =>
  'everbrite' + String(i + 1).padStart(3, '0')
);

// ════════════════════════════════════════
//  菜單資料
// ════════════════════════════════════════
const MENU = [
  { id: 'americano',  emoji: '☕', name: '美式咖啡',   en: 'Americano',         price: 80  },
  { id: 'latte',      emoji: '🥛', name: '拿鐵',       en: 'Latte',             price: 95  },
  { id: 'cappuccino', emoji: '☁️', name: '卡布奇諾',   en: 'Cappuccino',        price: 95  },
  { id: 'mocha',      emoji: '🍫', name: '摩卡',       en: 'Mocha',             price: 105 },
  { id: 'caramel',    emoji: '🍯', name: '焦糖瑪奇朵', en: 'Caramel Macchiato', price: 115 },
  { id: 'matcha',     emoji: '🍵', name: '抹茶拿鐵',   en: 'Matcha Latte',      price: 105 },
];

// ── 狀態 ──
let cart        = {};
let orderNumber = '';
let lineUser    = null;
let isInLine    = false;

// ════════════════════════════════════════
//  訂單儲存（localStorage）
// ════════════════════════════════════════
function getOrders() {
  try { return JSON.parse(localStorage.getItem('liff_orders') || '{}'); } catch { return {}; }
}
function saveOrder(id, data) {
  const o = getOrders(); o[id] = data;
  localStorage.setItem('liff_orders', JSON.stringify(o));
}

// ── 分配格子（挑第一個未被使用的）──
function assignLocker() {
  const inUse = new Set(
    Object.values(getOrders())
      .filter(o => o.status !== 'picked_up')
      .map(o => o.locker)
      .filter(Boolean)
  );
  return LOCKERS.find(l => !inUse.has(l)) || LOCKERS[0];
}

// ════════════════════════════════════════
//  LIFF 初始化
// ════════════════════════════════════════
async function initApp() {
  try {
    await liff.init({ liffId: LIFF_ID });
    isInLine = liff.isInClient();
    if (!liff.isLoggedIn()) { liff.login({ redirectUri: location.href }); return; }
    lineUser = await liff.getProfile();
    applyUser(lineUser);
    if (isInLine) document.getElementById('closeBtn').classList.add('show');
  } catch(e) {
    console.warn('[LIFF] demo mode:', e.message);
    lineUser = { userId: 'demo-001', displayName: 'DEMO 用戶', pictureUrl: '' };
    document.getElementById('demoBanner').style.display = 'flex';
    document.getElementById('headerSub').textContent = '請選擇您的飲品';
  }
  renderMenu();
  updateCartUI();
  hideLoading();
}

function applyUser(u) {
  if (u.pictureUrl) {
    document.getElementById('userAvatar').src = u.pictureUrl;
    document.getElementById('userAvatar').style.display = 'block';
    document.getElementById('userAvatarPh').style.display = 'none';
  }
  document.getElementById('headerSub').textContent = `Hi, ${u.displayName}！`;
}

function hideLoading() {
  const el = document.getElementById('loadingOverlay');
  el.classList.add('hidden');
  setTimeout(() => el.remove(), 400);
}

// ════════════════════════════════════════
//  菜單
// ════════════════════════════════════════
function renderMenu() {
  document.getElementById('menuGrid').innerHTML = MENU.map(item => `
    <div class="menu-card ${(cart[item.id]||0)>0?'has-qty':''}" id="card-${item.id}">
      <div class="menu-emoji">${item.emoji}</div>
      <div class="menu-name">${item.name}</div>
      <div class="menu-name-en">${item.en}</div>
      <div class="menu-price">$${item.price}</div>
      <div class="qty-control">
        <button class="qty-btn"      onclick="updateQty('${item.id}',-1)">−</button>
        <div class="qty-num" id="qty-${item.id}">${cart[item.id]||0}</div>
        <button class="qty-btn plus" onclick="updateQty('${item.id}',1)">+</button>
      </div>
    </div>`).join('');
}

function updateQty(id, delta) {
  const next = Math.max(0, (cart[id]||0) + delta);
  if (next === 0) delete cart[id]; else cart[id] = next;
  const el = document.getElementById('qty-'+id);
  if (el) el.textContent = next;
  const card = document.getElementById('card-'+id);
  if (card) card.className = 'menu-card ' + (next > 0 ? 'has-qty' : '');
  updateCartUI();
}

function updateCartUI() {
  const totalQty = Object.values(cart).reduce((a,b)=>a+b,0);
  document.getElementById('cartCount').textContent    = totalQty;
  document.getElementById('cartBtnLabel').textContent = totalQty>0 ? `${totalQty}件` : '購物車';
  document.getElementById('gotoCartBtn').disabled     = totalQty === 0;
  document.getElementById('cartSummary').textContent  = totalQty>0 ? `${totalQty} 件 · $${calcTotal()}` : '尚未選取';
}

function calcTotal() {
  return Object.entries(cart).reduce((s,[id,q])=>{
    const m = MENU.find(i=>i.id===id); return s + (m ? m.price*q : 0);
  }, 0);
}

// ════════════════════════════════════════
//  畫面切換
// ════════════════════════════════════════
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen'+name).classList.add('active');
  window.scrollTo(0,0);
}

function goToCart() {
  if (!Object.keys(cart).length) return;
  document.getElementById('cartList').innerHTML = Object.entries(cart).map(([id,qty])=>{
    const m = MENU.find(i=>i.id===id); if(!m) return '';
    return `<div class="cart-item">
      <div class="cart-item-emoji">${m.emoji}</div>
      <div class="cart-item-info">
        <div class="cart-item-name">${m.name}</div>
        <div class="cart-item-price">$${m.price} / 杯</div>
      </div>
      <div class="cart-item-qty">×${qty}</div>
      <div class="cart-item-subtotal">$${m.price*qty}</div>
    </div>`;
  }).join('');
  document.getElementById('cartTotal').textContent = '$'+calcTotal();
  document.getElementById('headerTitle').textContent = '🛒 確認訂單';
  document.getElementById('headerSub').textContent   = '確認後送出';
  document.getElementById('cartBtn').style.display   = 'none';
  showScreen('Cart');
}

function goToMenu() {
  document.getElementById('headerTitle').textContent = '智慧格子櫃點餐';
  document.getElementById('headerSub').textContent   =
    lineUser && lineUser.displayName !== 'DEMO 用戶' ? `Hi, ${lineUser.displayName}！` : '請選擇您的飲品';
  document.getElementById('cartBtn').style.display = 'flex';
  showScreen('Menu');
}

// ════════════════════════════════════════
//  下單
// ════════════════════════════════════════
async function placeOrder() {
  const letters = 'ABCDEFGH';
  orderNumber = letters[Math.floor(Math.random()*letters.length)] +
                String(Math.floor(Math.random()*99)+1).padStart(3,'0');

  const locker = assignLocker();

  const orderData = {
    id:     orderNumber,
    u:      lineUser?.displayName || 'DEMO 用戶',
    pic:    lineUser?.pictureUrl  || '',
    uid:    lineUser?.userId      || 'demo',
    items:  Object.entries(cart).map(([id,qty])=>{
              const m = MENU.find(i=>i.id===id);
              return { n: m.name, e: m.emoji, q: qty, v: m.price };
            }),
    t:      calcTotal(),
    locker: locker,
    status: 'pending',
    ts:     new Date().toISOString().slice(0,16),
  };

  // 儲存訂單
  saveOrder(orderNumber, orderData);

  generateQR(locker, orderData);

  document.getElementById('headerTitle').textContent = '✅ 訂單成立';
  document.getElementById('headerSub').textContent   = `訂單 #${orderNumber}`;
  document.getElementById('cartBtn').style.display   = 'none';
  showScreen('QR');

  await sendOrderMessage(locker);
}

// ════════════════════════════════════════
//  QR Code 產生（內容 = 格子代碼）
// ════════════════════════════════════════
function generateQR(locker, orderData) {
  document.getElementById('lockerCode').textContent = locker.toUpperCase();
  document.getElementById('qrOrderNum').textContent = '#' + orderData.id;

  const container = document.getElementById('qrcode');
  container.innerHTML = '';

  // QR 內容：格子代碼（固定格式，格子櫃硬體直接辨識）
  new QRCode(container, {
    text: locker,  // e.g. "everbrite005"
    width: 220, height: 220,
    colorDark: '#4A2C1A', colorLight: '#FFFFFF',
    correctLevel: QRCode.CorrectLevel.M,
  });

  // 訂單摘要
  const rows = orderData.items.map(i =>
    `<div class="qr-item-row"><span>${i.e} ${i.n} ×${i.q}</span><span>$${i.v*i.q}</span></div>`
  ).join('');
  document.getElementById('qrItemsSummary').innerHTML = `
    <div class="qr-items-title">訂單明細</div>${rows}
    <div class="qr-total-row"><span>合計</span><span>$${orderData.t}</span></div>`;
}

// ════════════════════════════════════════
//  LINE sendMessages
// ════════════════════════════════════════
async function sendOrderMessage(locker) {
  if (!isInLine) return;
  const itemsText = Object.entries(cart).map(([id,qty])=>{
    const m = MENU.find(i=>i.id===id);
    return `${m.emoji} ${m.name} ×${qty}  $${m.price*qty}`;
  }).join('\n');
  try {
    await liff.sendMessages([{ type:'text', text:
      `✅ 訂單已成立！\n取餐號碼：#${orderNumber}\n格子代碼：${locker.toUpperCase()}\n` +
      `─────────\n${itemsText}\n─────────\n合計：$${calcTotal()}\n\n📦 請至格子櫃掃碼取餐`
    }]);
  } catch(e) { console.warn('[LIFF] sendMessages:', e.message); }
}

function closeApp() { if (liff.isInClient()) liff.closeWindow(); }

function resetOrder() {
  cart = {}; orderNumber = '';
  document.getElementById('qrcode').innerHTML = '';
  renderMenu(); updateCartUI(); goToMenu();
}

// ── 啟動 ──
initApp();
</script>
